name: AutoImport
options:
  bundleIdPrefix: com.matcom
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.matcom.AutoImport
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: 0.1.3
    DEVELOPMENT_TEAM: 382G4857JD
    CODE_SIGN_STYLE: Automatic
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3
targets:
  AutoImport:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: Models
      - path: Stores
      - path: Services
      - path: Support
    dependencies:
      - package: Sparkle
        product: Sparkle
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: AutoImport
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.photography
        NSPrincipalClass: NSApplication
        SUFeedURL: https://raw.githubusercontent.com/mcomisso/autoimport/main/appcast.xml
        SUPublicEDKey: mklx990y+GuDiC6jXVj8qWoFd0H2LJHi76UGuu/P3Pw=
        SUEnableAutomaticChecks: true
        SUAllowsAutomaticUpdates: true
    settings:
      base:
        PRODUCT_NAME: AutoImport
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
    scheme:
      testTargets:
        - AutoImportTests
  AutoImportTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AutoImportTests
    dependencies:
      - target: AutoImport
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
